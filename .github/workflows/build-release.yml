name: Build and Release PowerID

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    # PowerID.Core and PowerID.Tests are plain net8.0 with no Windows/WinUI dependency, so the
    # actual battery-math/formatting test suite runs fast on Linux without needing the Windows
    # App SDK toolchain at all.
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Run unit tests
      run: dotnet test PowerID.Tests/PowerID.Tests.csproj -c Release --logger "console;verbosity=normal"

  build:
    needs: test
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # dotnet build's own MSBuild host has been unreliable at launching XamlCompiler.exe (a .NET
    # Framework 4.7.2 external tool) - it fails instantly with a bare exit code and no diagnostic
    # output. The full Visual Studio msbuild.exe already on this runner hosts it correctly.
    - name: Set up MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Install icon generator dependencies
      run: pip install --quiet Pillow

    - name: Generate app icons
      run: python generate_icon.py
      shell: pwsh

    - name: Restore dependencies
      run: dotnet restore PowerID.sln

    - name: Build (Release, x64)
      run: msbuild PowerID.sln /p:Configuration=Release /p:Platform=x64 /v:normal /bl:msbuild.binlog /nr:false

    - name: Dump XAML compiler diagnostics on failure
      if: failure()
      shell: pwsh
      run: |
        $objDir = "PowerID/obj/x64/Release/net8.0-windows10.0.19041.0"
        Get-ChildItem -Path $objDir -Filter *.json -ErrorAction SilentlyContinue | ForEach-Object {
          Write-Host "----- $($_.FullName) -----"
          Get-Content $_.FullName
        }
        Get-ChildItem -Path $objDir -Recurse -Include *.log,*.err -ErrorAction SilentlyContinue | ForEach-Object {
          Write-Host "----- $($_.FullName) -----"
          Get-Content $_.FullName
        }

    - name: Upload diagnostics on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: xaml-compiler-diagnostics
        path: |
          PowerID/obj/x64/Release/net8.0-windows10.0.19041.0
          msbuild.binlog
        retention-days: 7

  publish:
    needs: build
    runs-on: windows-2022
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # Same reasoning as the build job: use the full msbuild.exe, not `dotnet publish`, so
    # XamlCompiler.exe (a .NET Framework 4.7.2 external tool) launches correctly.
    - name: Set up MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Install icon generator dependencies
      run: pip install --quiet Pillow

    - name: Generate app icons
      run: python generate_icon.py
      shell: pwsh

    - name: Restore dependencies
      run: dotnet restore PowerID.sln

    # The self-contained *unpackaged* deployment mode (WindowsPackageType=None) crashes on launch
    # with 0xC000027B in Microsoft.UI.Xaml.dll - a known-hard WinAppSDK bug specific to combining
    # self-contained bundling with reg-free WinRT activation (see PowerID/PowerID.csproj comment on
    # WindowsAppSDKUndockedRegFreeWinRTInitialize). A framework-dependent unpackaged build launches
    # fine, but MSIX sidesteps the whole class of problem: packaged apps get WinRT activation
    # through package identity, so we ship a signed MSIX instead. This is also exactly the artifact
    # format the Microsoft Store submission pipeline needs.
    - name: Decode signing certificate
      shell: pwsh
      run: |
        $pfxBytes = [Convert]::FromBase64String("${{ secrets.POWERID_PFX_BASE64 }}")
        [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\PowerID.pfx", $pfxBytes)

    - name: Build signed MSIX package
      run: |
        msbuild PowerID/PowerID.csproj `
          /t:_GenerateAppxPackage `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:AppxBundlePlatforms=x64 `
          /p:AppxBundle=Never `
          /p:UapAppxPackageBuildMode=SideloadOnly `
          /p:GenerateAppInstallerFile=false `
          /p:AppxPackageDir=AppPackages\ `
          /p:AppxPackageSigningEnabled=true `
          /p:PackageCertificateKeyFile="$env:RUNNER_TEMP\PowerID.pfx" `
          /p:PackageCertificatePassword="${{ secrets.POWERID_PFX_PASSWORD }}" `
          /nr:false
      shell: pwsh

    - name: Locate and rename MSIX artifact
      shell: pwsh
      run: |
        $msix = Get-ChildItem -Path PowerID\AppPackages -Filter *.msix -Recurse | Select-Object -First 1
        Copy-Item $msix.FullName -Destination PowerID-win-x64.msix
        Copy-Item signing\PowerID.cer -Destination PowerID.cer

    - name: Get version from tag
      id: get_version
      run: |
        if ("${{ github.ref }}".StartsWith("refs/tags/v")) {
          $version = "${{ github.ref }}".Substring(11)
        } else {
          $version = "dev-$($env:GITHUB_SHA.Substring(0,7))"
        }
        echo "version=$version" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          PowerID-win-x64.msix
          PowerID.cer
        name: PowerID v${{ steps.get_version.outputs.version }}
        body: |
          ## PowerID v${{ steps.get_version.outputs.version }}

          Advanced Battery Monitoring for Windows

          ### Installation
          This package is self-signed (not yet on the Microsoft Store), so Windows won't trust it
          out of the box. One-time setup:
          1. Download both `PowerID-win-x64.msix` and `PowerID.cer`.
          2. Right-click `PowerID.cer` > **Install Certificate** > **Local Machine** > place it in
             the **Trusted People** store (requires admin).
          3. Double-click `PowerID-win-x64.msix` to install, or run
             `Add-AppxPackage -Path .\PowerID-win-x64.msix` in PowerShell.

          If installation still fails, enable **Developer Mode** under
          **Settings > Privacy & security > For developers**.

          ### System Requirements
          - Windows 10 version 1809 (build 17763) or later, x64
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload artifact (for manual runs)
      if: github.event_name == 'workflow_dispatch'
      uses: actions/upload-artifact@v4
      with:
        name: PowerID-${{ steps.get_version.outputs.version }}
        path: |
          PowerID-win-x64.msix
          PowerID.cer
        retention-days: 30
